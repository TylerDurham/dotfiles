background {
    monitor =
    path = ~/.config/hypr/wallpapers/default.jpg
    blur_passes = 5
    blur_size = 7
    brightness = 0.6
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    outer_color = rgb(cdd6f4)
    inner_color = rgb(1e1e2e)
    font_color = rgb(cdd6f4)
    fade_on_empty = true
    placeholder_text = <i>Password</i>
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    font_size = 64
    position = 0, 80
    halign = center
    valign = center
}

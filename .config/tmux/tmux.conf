# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
# set -g @plugin 'catppuccin/tmux#latest' # See https://github.com/catppuccin/tmux/tags for additional tags

# Wayland clipboard support — ensure wl-copy can find the display socket
set -g update-environment "WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_RUNTIME_DIR"

# OSC 52 passthrough — works with Ghostty on both Linux and macOS
set -g set-clipboard on

set -g @yank_action 'copy-pipe-and-cancel'
setw -g mode-keys vi


# Set prefix binding
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix
bind c new-window -c "#{window_current_path}"

# Bind r so we can resource configuration
unbind r 
bind r source-file ~/.config/tmux/tmux.conf

# TMUX-POPUP
bind-key u run-shell '~/.config/tmux/popup.sh'

# WINDOW SPLITTING
bind | split-window -h
bind - split-window -v

# Arrow keys resizing (repeatable)
bind -r Left  resize-pane -L 5
bind -r Down  resize-pane -D 5
bind -r Up    resize-pane -U 5
bind -r Right resize-pane -R 5

# START WINDOWS AND PANES AT 1, NOT 0
set -g base-index 1
setw -g pane-base-index 1

# VIM STYLE PANE NAV 
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# CURSOR - blinking block normally, blinking underline in copy mode
set -g cursor-style blinking-block
set-hook -g pane-mode-changed 'if -F "#{==:#{pane_mode},copy-mode}" "set cursor-style blinking-underline" "set cursor-style blinking-block"'

set -g mouse on
# Increase scrollback buffer size from 2000 to 50000 lines
set -g history-limit 50000

# THEME
source ~/.config/tmux/theme.conf

run '~/.config/tmux/tpm.sh'
set -g popup-border-style fg=#FFCC00

# # Modern syntax (tmux 2.9+)
# set -g pane-border-style fg=colour238,bg=colour234
# set -g pane-active-border-style fg=colour252,bg=colour234   

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'
run '~/.config/tmux/plugins/tpm/tpm'
